<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Strike - Maze Gauntlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background: #020617;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }
        canvas { display: block; }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            z-index: 10;
        }
        .health-bar-container {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #playerHealth {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.2s ease-out;
        }
        #gameMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: block;
            pointer-events: auto;
            z-index: 50;
        }
        .objective-marker {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #fbbf24;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="ui-overlay flex flex-col gap-4">
        <div>
            <div class="text-[10px] uppercase tracking-[0.2em] font-bold text-emerald-400 mb-1">Operative Vital Signs</div>
            <div class="health-bar-container">
                <div id="playerHealth"></div>
            </div>
        </div>
        <div id="stats" class="text-[10px] font-mono text-slate-400">
            LOC: 0, 0<br>
            ENEMIES ACTIVE: <span id="enemyCount">0</span>
        </div>
    </div>

    <div class="objective-marker">
        <div>Extraction Point</div>
        <div id="distText">5000m</div>
        <div id="compass" class="inline-block mt-2">↑</div>
    </div>

    <div id="gameMessage" class="bg-slate-900/95 p-10 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl">
        <h1 id="statusTitle" class="text-6xl font-black text-white mb-2 tracking-tighter italic">NEON MAZE</h1>
        <p id="statusText" class="text-slate-400 mb-8 max-w-sm mx-auto">Reach the yellow extraction zone. Beware of Stalkers (Chasers) and Sentinels (Turrets).</p>
        <button onclick="resetGame()" class="bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 px-12 rounded-full transition-all transform hover:scale-105 active:scale-95 uppercase tracking-widest text-sm">Initialize Link</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerHealthBar = document.getElementById('playerHealth');
        const gameMessage = document.getElementById('gameMessage');
        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const distText = document.getElementById('distText');
        const compass = document.getElementById('compass');
        const enemyCountEl = document.getElementById('enemyCount');

        const WORLD = { width: 5000, height: 5000 };
        const CONFIG = {
            playerAccel: 1.2,
            maxVelocity: 9,
            friction: 0.92,
            bulletSpeed: 18,
            playerDamage: 35,
            enemyDamage: 12, 
            extractionRadius: 350,
            healthDropChance: 0.3,
            healthHealAmount: 25
        };

        let camera = { x: 0, y: 0 };
        let player = null;
        let enemies = [];
        let bullets = [];
        let obstacles = [];
        let pickups = [];
        let keys = {};
        let mouse = { x: 0, y: 0, down: false };
        let gameActive = false;
        let goal = { x: WORLD.width - 500, y: WORLD.height - 500 };

        class Entity {
            constructor(x, y, radius, color, type = 'stalker') {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.type = type;
                this.velX = 0;
                this.velY = 0;
                this.angle = 0;
                this.lastShot = 0;
                this.memoryX = x; // AI Memory of player position
                this.memoryY = y;
                this.suppressionTimer = 0;
                
                if (type === 'stalker') this.health = 200;
                else if (type === 'sentinel') this.health = 400;
                else this.health = 100;
            }

            draw() {
                const sx = this.x - camera.x;
                const sy = this.y - camera.y;
                if (sx < -100 || sx > canvas.width + 100 || sy < -100 || sy > canvas.height + 100) return;

                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(this.angle);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                if (this.type === 'sentinel') {
                    ctx.fillRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.radius - 5, -4, 20, 8);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle, color, owner) {
                this.x = x;
                this.y = y;
                this.dx = Math.cos(angle) * CONFIG.bulletSpeed;
                this.dy = Math.sin(angle) * CONFIG.bulletSpeed;
                this.color = color;
                this.owner = owner;
                this.life = 120;
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.life--;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camera.x, this.y - camera.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Pickup {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.pulse = 0;
            }
            draw() {
                this.pulse += 0.1;
                const sx = this.x - camera.x;
                const sy = this.y - camera.y;
                const s = 1 + Math.sin(this.pulse) * 0.2;
                
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#10b981';
                ctx.fillStyle = '#10b981';
                ctx.beginPath();
                ctx.arc(sx, sy, this.radius * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }
        }

        function generateMaze() {
            obstacles = [];
            obstacles.push({x: 0, y: 0, w: WORLD.width, h: 40});
            obstacles.push({x: 0, y: WORLD.height-40, w: WORLD.width, h: 40});
            obstacles.push({x: 0, y: 0, w: 40, h: WORLD.height});
            obstacles.push({x: WORLD.width-40, y: 0, w: 40, h: WORLD.height});

            for(let i=0; i<140; i++) {
                const isVertical = Math.random() > 0.5;
                obstacles.push({
                    x: Math.random() * (WORLD.width - 800) + 400,
                    y: Math.random() * (WORLD.height - 800) + 400,
                    w: isVertical ? 40 : 300 + Math.random() * 500,
                    h: isVertical ? 300 + Math.random() * 500 : 40
                });
            }
        }

        function resetGame() {
            player = new Entity(250, 250, 20, '#10b981', 'player');
            generateMaze();
            enemies = [];
            pickups = [];
            
            for(let i=0; i<20; i++) {
                enemies.push(new Entity(
                    Math.random() * (WORLD.width - 1500) + 750,
                    Math.random() * (WORLD.height - 1500) + 750,
                    22, '#f43f5e', 'stalker'
                ));
            }

            for(let i=0; i<30; i++) {
                enemies.push(new Entity(
                    Math.random() * (WORLD.width - 1500) + 750,
                    Math.random() * (WORLD.height - 1500) + 750,
                    25, '#fb923c', 'sentinel'
                ));
            }

            bullets = [];
            gameMessage.style.display = 'none';
            gameActive = true;
            if(playerHealthBar) playerHealthBar.style.width = '100%';
        }

        function checkCollision(x, y, radius) {
            for (let o of obstacles) {
                if (x + radius > o.x && x - radius < o.x + o.w &&
                    y + radius > o.y && y - radius < o.y + o.h) return o;
            }
            return null;
        }

        // Raycasting for Line of Sight
        function hasLineOfSight(from, to) {
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const dist = Math.hypot(dx, dy);
            const steps = Math.floor(dist / 20);
            for(let i = 0; i < steps; i++) {
                const tx = from.x + (dx * (i/steps));
                const ty = from.y + (dy * (i/steps));
                if(checkCollision(tx, ty, 5)) return false;
            }
            return true;
        }

        function updateAI() {
            if (!player) return;
            const now = Date.now();
            
            enemies.forEach(e => {
                const canSeePlayer = hasLineOfSight(e, player);
                if (canSeePlayer) {
                    e.memoryX = player.x;
                    e.memoryY = player.y;
                    e.suppressionTimer = 60; // AI remembers player for 60 frames
                } else if (e.suppressionTimer > 0) {
                    e.suppressionTimer--;
                }

                const dx = e.memoryX - e.x;
                const dy = e.memoryY - e.y;
                const dist = Math.hypot(dx, dy);

                if (e.type === 'stalker') {
                    // Predictive Tracking: Aim where player is going
                    let targetX = e.memoryX + (canSeePlayer ? player.velX * 15 : 0);
                    let targetY = e.memoryY + (canSeePlayer ? player.velY * 15 : 0);
                    
                    let moveAngle = Math.atan2(targetY - e.y, targetX - e.x);
                    
                    // Improved Flanking/Obstacle Logic
                    const checkAngles = [0, 0.5, -0.5, 1.0, -1.0, 1.5, -1.5, Math.PI];
                    let bestAngle = moveAngle;
                    
                    for(let offset of checkAngles) {
                        const test = moveAngle + offset;
                        const tx = e.x + Math.cos(test) * 70;
                        const ty = e.y + Math.sin(test) * 70;
                        if (!checkCollision(tx, ty, e.radius + 5)) {
                            bestAngle = test;
                            break;
                        }
                    }

                    e.velX += Math.cos(bestAngle) * 0.95;
                    e.velY += Math.sin(bestAngle) * 0.95;
                    e.angle = Math.atan2(dy, dx);

                    // Only shoot if roughly facing player and has "recent" memory
                    if (dist < 800 && e.suppressionTimer > 0 && now - e.lastShot > 1200) {
                        bullets.push(new Bullet(e.x, e.y, e.angle, e.color, 'enemy'));
                        e.lastShot = now;
                    }
                } else if (e.type === 'sentinel') {
                    if (dist < 700 && e.suppressionTimer > 0) {
                        e.angle = Math.atan2(dy, dx);
                        // Sentinels fire faster and suppression fire
                        if (now - e.lastShot > (canSeePlayer ? 300 : 600)) { 
                            bullets.push(new Bullet(e.x, e.y, e.angle, e.color, 'enemy'));
                            e.lastShot = now;
                        }
                    }
                }
            });
        }

        function update() {
            if (!gameActive || !player) return;

            if (keys['w']) player.velY -= CONFIG.playerAccel;
            if (keys['s']) player.velY += CONFIG.playerAccel;
            if (keys['a']) player.velX -= CONFIG.playerAccel;
            if (keys['d']) player.velX += CONFIG.playerAccel;

            [player, ...enemies].forEach(e => {
                e.velX *= CONFIG.friction;
                e.velY *= CONFIG.friction;
                
                const speed = Math.hypot(e.velX, e.velY);
                const limit = e === player ? CONFIG.maxVelocity : 7.0;
                if (speed > limit) {
                    e.velX = (e.velX / speed) * limit;
                    e.velY = (e.velY / speed) * limit;
                }

                e.x += e.velX;
                let hitX = checkCollision(e.x, e.y, e.radius);
                if (hitX) {
                    e.x = e.velX > 0 ? hitX.x - e.radius : hitX.x + hitX.w + e.radius;
                    e.velX = 0;
                }

                e.y += e.velY;
                let hitY = checkCollision(e.x, e.y, e.radius);
                if (hitY) {
                    e.y = e.velY > 0 ? hitY.y - e.radius : hitY.y + hitY.h + e.radius;
                    e.velY = 0;
                }
            });

            camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
            camera.x = Math.max(0, Math.min(camera.x, WORLD.width - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD.height - canvas.height));

            player.angle = Math.atan2(mouse.y + camera.y - player.y, mouse.x + camera.x - player.x);

            pickups.forEach((p, i) => {
                if (Math.hypot(p.x - player.x, p.y - player.y) < player.radius + p.radius) {
                    player.health = Math.min(100, player.health + CONFIG.healthHealAmount);
                    if (playerHealthBar) playerHealthBar.style.width = player.health + '%';
                    pickups.splice(i, 1);
                }
            });

            bullets.forEach((b, i) => {
                b.update();
                if (b.life <= 0 || checkCollision(b.x, b.y, 2)) {
                    bullets.splice(i, 1); return;
                }

                if (b.owner === 'player') {
                    enemies.forEach((en, j) => {
                        if (Math.hypot(b.x - en.x, b.y - en.y) < en.radius) {
                            en.health -= CONFIG.playerDamage;
                            bullets.splice(i, 1);
                            if (en.health <= 0) {
                                if (Math.random() < CONFIG.healthDropChance) {
                                    pickups.push(new Pickup(en.x, en.y));
                                }
                                enemies.splice(j, 1);
                            }
                        }
                    });
                } else {
                    if (Math.hypot(b.x - player.x, b.y - player.y) < player.radius) {
                        player.health -= CONFIG.enemyDamage;
                        bullets.splice(i, 1);
                        if (player.health <= 0) endGame(false);
                        if (playerHealthBar) playerHealthBar.style.width = player.health + '%';
                    }
                }
            });

            if (mouse.down && Date.now() % 150 < 20) {
                bullets.push(new Bullet(player.x, player.y, player.angle, player.color, 'player'));
            }

            const distToGoal = Math.hypot(player.x - goal.x, player.y - goal.y);
            if (distToGoal < CONFIG.extractionRadius) endGame(true);

            if (distText) distText.innerText = Math.round(distToGoal) + "m";
            const angleToGoal = Math.atan2(goal.y - player.y, goal.x - player.x);
            if (compass) compass.style.transform = `rotate(${angleToGoal + Math.PI/2}rad)`;
            if (enemyCountEl) enemyCountEl.innerText = enemies.length;

            updateAI();
        }

        function endGame(won) {
            gameActive = false;
            gameMessage.style.display = 'block';
            statusTitle.innerText = won ? "EXTRACTED" : "LINK LOST";
            statusTitle.style.color = won ? "#fbbf24" : "#f43f5e";
            statusText.innerText = won ? "Mission Complete. You've cleared the maze." : "Critical systems failure. Hostile forces overwhelmed the operative.";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            for(let x = -camera.x % 100; x < canvas.width; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y = -camera.y % 100; y < canvas.height; y += 100) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.save();
            ctx.translate(goal.x - camera.x, goal.y - camera.y);
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#fbbf24';
            ctx.fillStyle = 'rgba(251, 191, 36, 0.2)';
            ctx.beginPath(); ctx.arc(0, 0, CONFIG.extractionRadius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.restore();

            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = '#334155';
            obstacles.forEach(o => {
                ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h);
                ctx.strokeRect(o.x - camera.x, o.y - camera.y, o.w, o.h);
            });

            pickups.forEach(p => p.draw());
            bullets.forEach(b => b.draw());
            enemies.forEach(e => e.draw());
            if (player) player.draw();

            if (player) {
                const mS = 0.03;
                const mW = WORLD.width * mS;
                const mH = WORLD.height * mS;
                ctx.save();
                ctx.translate(canvas.width - mW - 20, canvas.height - mH - 20);
                ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
                ctx.fillRect(0, 0, mW, mH);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.strokeRect(0, 0, mW, mH);
                
                ctx.fillStyle = '#334155';
                obstacles.forEach(o => ctx.fillRect(o.x*mS, o.y*mS, o.w*mS, o.h*mS));
                
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath(); ctx.arc(goal.x*mS, goal.y*mS, 4, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x*mS - 2, player.y*mS - 2, 4, 4);
                
                enemies.forEach(e => {
                    ctx.fillStyle = e.color;
                    ctx.fillRect(e.x*mS - 1, e.y*mS - 1, 2, 2);
                });
                
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(camera.x*mS, camera.y*mS, canvas.width*mS, canvas.height*mS);
                ctx.restore();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => mouse.down = true);
        window.addEventListener('mouseup', () => mouse.down = false);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateMaze();
            gameLoop();
        };
    </script>
</body>
</html>
